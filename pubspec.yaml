name: geniuses_school
description: Geniuses School mobile application.
publish_to: 'none'

version: 1.0.12+17

environment:
  sdk: '>=3.10.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_bloc: ^9.1.1
  bloc: ^9.1.1
  
  # Code Generation
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  
  # Dependency Injection
  get_it: ^9.2.0
  injectable: ^2.7.1+4
  
  # Networking
  dio: ^5.9.0
  retrofit: ^4.9.2
  pretty_dio_logger: ^1.4.0
  
  # Navigation
  go_router: ^17.0.1
  
  # Local Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.5.4
  
  # UI/UX
  flutter_screenutil: ^5.9.3
  cached_network_image: ^3.4.1
  skeletonizer: ^2.1.2
  toastification: ^3.0.3
  lottie: ^3.3.2
  pinput: ^6.0.2
  intl_phone_field: ^3.2.0
  
  # Localization
  easy_localization: ^3.0.8
  
  # Utils
  image_picker: ^1.2.1
  intl: ^0.20.2
  google_fonts: ^8.0.0
  equatable: ^2.0.5
  url_launcher: ^6.3.2
  package_info_plus: ^9.0.0
  device_info_plus: ^12.3.0
  
  # Firebase
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  firebase_crashlytics: ^4.3.10
  flutter_local_notifications: ^17.0.0
  
  # Other Utilities
  file_picker: ^10.3.3
  dotted_border: ^2.1.0
  table_calendar: ^3.2.0
  flutter_rating_bar: ^4.0.1
  fl_chart: ^1.1.1
  webview_flutter: ^4.4.2
  webview_flutter_web: ^0.2.2+1
  open_filex: ^4.7.0
  pdfx: ^2.9.2
  path_provider: ^2.1.5
  agora_rtc_engine: ^6.5.3
  permission_handler: ^12.0.1
  wakelock_plus: ^1.4.0
  country_flags: ^2.2.0
  country_icons: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Code Generation
  build_runner: ^2.10.5
  freezed: ^3.2.4
  json_serializable: ^6.11.4
  injectable_generator: ^2.12.0
  retrofit_generator: ^10.2.1

flutter:
  uses-material-design: true
  generate: false

  assets:
    - .env
    - assets/images/
    - assets/translations/
    - assets/lottie/
    - shorebird.yaml
